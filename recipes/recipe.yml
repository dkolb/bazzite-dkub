name: bazzite-dkub
description: This is my personal OS image.
base-image: ghcr.io/ublue-os/bazzite
image-version: stable
modules:
  - type: containerfile
    containerfiles:
      - buildargs
  - type: files
    files:
      - source: system
        destination: /
  - type: rpm-ostree
    repos:
      - vscode.repo
      - docker-ce.repo
    keys:
      - https://packages.microsoft.com/keys/microsoft.asc
      - https://download.docker.com/linux/fedora/gpg
    install:
      - code
      - hardinfo2
      - firefox
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
  - type: default-flatpaks
    notify: true
    system:
      install:
        - com.github.mtkennerly.ludusavi
        - io.podman_desktop.PodmanDesktop
      remove:
        - org.mozilla.firefox
  - type: bling
    install:
      - 1password
  - type: justfiles
    include:
      - enable-daily-ludsavi-backups.just
      - luks-fido2.just
  - type: script
    scripts:
      - finalize_build.sh
  - type: containerfile
    containerfiles:
      - labels
  - type: signing