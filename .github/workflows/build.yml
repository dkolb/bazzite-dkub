name: "Build Bazzite DKUB Edition"
run-name: "Build for ${{ github.event_name == 'pull_request' && format('PR:{0}', github.event.number) || github.ref_name }}"
on:
  schedule:
    - cron: "00 12 * * *" # build at 06:00 UTC every day 
                          # (20 minutes after last ublue images start building)
  push:
    branches:
      - main
      - dev
    paths-ignore: # don't rebuild if only documentation has changed
      - "**.md"
      
  pull_request:
  workflow_dispatch: # allow manually triggering builds
jobs:
  determine-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix-selection.outputs.matrix }}
    steps:
      - id: matrix-selection
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BRANCH: ${{ github.ref_name }}
        run: |
          if [[ "$BRANCH" == "main" && "$EVENT_NAME" != "pull_request" ]]; then
            echo 'matrix={"recipe": ["stable.yml", "testing.yml", "unstable.yml"]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"recipe": ["stable.yml"]}' >> $GITHUB_OUTPUT
          fi
  bluebuild:
    name: Build Image - ${{ matrix.recipe }}
    runs-on: ubuntu-latest
    needs: [determine-matrix]
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix: ${{ fromJson(needs.determine-matrix.outputs.matrix) }}
      fail-fast: true
    steps:
      - uses: actions/checkout@v4
       # the build is fully handled by the reusable github action
      - name: Determine IMAGE_TAG name
        id: image-tag-name
        env:
          EVENT_NAME: ${{ github.event_name }}
          BRANCH: ${{ github.ref_name }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            echo "image-tag=pr${PR_NUMBER}" >> $GITHUB_OUTPUT
          elif [[ "$BRANCH" == "main" ]]; then
            echo "image-tag=stable" >> $GITHUB_OUTPUT
          else
            echo "image-tag=br-${BRANCH_NAME}" >> $GITHUB_OUTPUT
          fi
      - name: Build Image Info ARGS Containerfile
        working-directory: ./containerfiles/buildargs/
        shell: bash
        run: |
          printf "###\n# containerfiles/buildargs/Containerfile\n###\n\n" > Containerfile
          echo "ARG GIT_BRANCH='${{ github.ref_name }}'" >> Containerfile
          echo "ARG IMAGE_TAG='${{ steps.image-tag-name.outputs.image-tag }}'" >> Containerfile
          echo "ARG GIT_REPO='${{ github.server_url }}/${{ github.repository }}'" >> Containerfile
          echo "ARG GIT_SHA='${{ github.sha }}'" >> Containerfile
          printf "###\nend file\n###\n\n"
      - name: Build Image Lables Containerfile
        working-directory: ./containerfiles/labels
        shell: bash
        run: |
          # Append Only to this file since it already has our vendor label
          echo "LABEL org.opencontainers.image.version=\"41.`date '+%Y%m%d'`\"" >> Containerfile
          echo "LABEL org.opencontainers.image.created=\"`date -u +%Y-%m-%dT%H:%M:%SZ`\"" >> Containerfile
          echo "LABEL org.opencontainers.image.url=\"${{ github.server_url }}/${{ github.repository }}\"" >> Containerfile
      - name: Build Custom Image
        uses: blue-build/github-action@v1.7
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
          skip_checkout: true
          build_opts: "--compression-format zstd"
